<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Permainan Khas Tegal - Petualangan Kuliner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tegal: {
                            utama: '#B45309',
                            kedua: '#F59E0B',
                            latar: '#FFFBEB',
                            hijau: '#16A34A',
                            merah: '#DC2626'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-tegal-latar font-sans min-h-screen flex flex-col items-center p-4">

    <div class="max-w-md w-full">
        <!-- JUDUL -->
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold text-tegal-utama">🏙️ PERMAINAN KHAS TEGAL</h1>
            <h2 class="text-lg font-semibold text-tegal-kedua">🍲 Petualangan Kuliner Lezat</h2>
        </div>

        <!-- INFO PERMAINAN -->
        <div class="bg-white rounded-xl shadow-lg p-4 mb-4">
            <div class="flex justify-between text-lg font-bold mb-2">
                <span>🏆 Skor: <span id="skor">0</span></span>
                <span>❤️ Nyawa: <span id="nyawa">3</span></span>
            </div>
            <p class="text-sm text-gray-600 mb-3">👉 Sentuh makanan khas Tegal, hindari barang yang tidak enak!</p>
            <button id="mulaiBtn" class="w-full bg-tegal-utama hover:bg-amber-800 text-white font-bold py-2 rounded-lg">
                ▶️ MULAI PERMAINAN
            </button>
        </div>

        <!-- AREA PERMAINAN -->
        <div id="areaGame" class="bg-gradient-to-b from-sky-200 to-green-200 rounded-xl shadow-lg w-full h-[400px] relative overflow-hidden border-4 border-tegal-utama">
            <!-- LATAR -->
            <div class="absolute bottom-0 w-full h-16 bg-green-600"></div>
            <div class="absolute bottom-12 left-4 text-3xl">🏠</div>
            <div class="absolute bottom-12 right-4 text-3xl">⛰️</div>
            <div class="absolute top-4 right-6 text-2xl">☀️</div>

            <!-- PEMAIN -->
            <div id="pemain" class="absolute bottom-16 left-1/2 -translate-x-1/2 text-4xl transition-all duration-100">
                🧑‍🌾
            </div>
        </div>

        <!-- DAFTAR MAKANAN KHAS TEGAL -->
        <div class="bg-white rounded-xl shadow-lg p-4 mt-4">
            <h3 class="font-bold text-tegal-utama mb-2">🍽️ Makanan Khas Tegal:</h3>
            <div class="grid grid-cols-3 gap-2 text-center text-sm">
                <div class="p-1">🥘 Tahu Aci</div>
                <div class="p-1">🍲 Tahu Upil</div>
                <div class="p-1">🍛 Nasi Ponggol</div>
                <div class="p-1">🥤 Teh Poci</div>
                <div class="p-1">🍡 Kue Tahu</div>
                <div class="p-1">🥩 Sate Tegal</div>
            </div>
        </div>
    </div>

    <script>
        const makananKhas = ['🥘','🍲','🍛','🥤','🍡','🥩','🍪','🥨'];
        const rintangan = ['🧱','🪨','💨','🍂'];
        
        let skor = 0;
        let nyawa = 3;
        let gameJalan = false;
        let intervalJatuh;
        let elemenJatuh = [];

        const areaGame = document.getElementById('areaGame');
        const pemain = document.getElementById('pemain');
        const tampilSkor = document.getElementById('skor');
        const tampilNyawa = document.getElementById('nyawa');
        const mulaiBtn = document.getElementById('mulaiBtn');

        // GERAK PEMAIN
        let posisiX = 50;
        document.addEventListener('keydown', e => {
            if(!gameJalan) return;
            if(e.key === 'ArrowLeft' && posisiX > 8) posisiX -= 8;
            if(e.key === 'ArrowRight' && posisiX < 92) posisiX += 8;
            pemain.style.left = posisiX + '%';
        });

        // SENTUH LAYAR HP
        let sentuhMulai = 0;
        areaGame.addEventListener('touchstart', e => sentuhMulai = e.touches[0].clientX);
        areaGame.addEventListener('touchmove', e => {
            if(!gameJalan) return;
            let geser = e.touches[0].clientX - sentuhMulai;
            if(geser < -30 && posisiX > 8) posisiX -= 6;
            if(geser > 30 && posisiX < 92) posisiX += 6;
            pemain.style.left = posisiX + '%';
        });

        // BUAT BENDA JATUH
        function bendaJatuh() {
            let benda = document.createElement('div');
            benda.className = 'absolute text-3xl transition-all';
            benda.style.left = Math.random() * 85 + 5 + '%';
            benda.style.top = '-40px';
            
            if(Math.random() < 0.65) {
                benda.innerText = makananKhas[Math.floor(Math.random() * makananKhas.length)];
                benda.benar = true;
            } else {
                benda.innerText = rintangan[Math.floor(Math.random() * rintangan.length)];
                benda.benar = false;
            }

            areaGame.appendChild(benda);
            elemenJatuh.push(benda);
        }

        // GERAKKAN BENDA
        function gerakBenda() {
            elemenJatuh.forEach((benda, i) => {
                let posAtas = parseFloat(benda.style.top || 0) + 2.5;
                benda.style.top = posAtas + 'px';

                // TABRAKAN
                if(posAtas > 320 && posAtas < 380) {
                    let posBenda = parseFloat(benda.style.left);
                    if(Math.abs(posBenda - posisiX) < 12) {
                        if(benda.benar) {
                            skor += 10;
                            benda.style.transform = 'scale(1.5)';
                            benda.style.opacity = '0';
                        } else {
                            nyawa--;
                            benda.style.transform = 'rotate(180deg)';
                        }
                        setTimeout(() => benda.remove(), 200);
                        elemenJatuh.splice(i,1);
                    }
                }

                // JATUH KE BAWAH
                if(posAtas > 420) {
                    benda.remove();
                    elemenJatuh.splice(i,1);
                }
            });

            tampilSkor.innerText = skor;
            tampilNyawa.innerText = nyawa;

            if(nyawa <= 0) akhirGame();
        }

        // MULAI GAME
        function mulaiGame() {
            skor = 0; nyawa = 3; gameJalan = true;
            elemenJatuh.forEach(b => b.remove());
            elemenJatuh = [];
            posisiX = 50; pemain.style.left = '50%';
            tampilSkor.innerText = '0'; tampilNyawa.innerText = '3';
            mulaiBtn.innerText = '⏳ BERMAIN...';
            mulaiBtn.disabled = true;

            intervalJatuh = setInterval(() => {
                bendaJatuh();
                gerakBenda();
            }, 350);
        }

        // AKHIR GAME
        function akhirGame() {
            gameJalan = false;
            clearInterval(intervalJatuh);
            mulaiBtn.innerText = '🔄 MAIN LAGI';
            mulaiBtn.disabled = false;
            alert(`🎉 PERMAINAN SELESAI!\nSkor Kamu: ${skor}\nTerima kasih melestarikan kuliner Tegal!`);
        }

        mulaiBtn.addEventListener('click', mulaiGame);
    </script>
</body>
</html>
