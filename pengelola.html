<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Pengelola - Pembagian Dana</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
        body {background:#f8f9fa; padding:15px;}
        .header {background:#212529; color:white; padding:18px; border-radius:12px; text-align:center; margin-bottom:20px;}
        .kartu {background:white; border-radius:12px; padding:15px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
        .belum {border-left:4px solid #ffc107;}
        .sudah {border-left:4px solid #28a745;}
        .baris {display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #f0f0f0;}
        .btn {padding:10px 15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin:4px;}
        .btn-salin {background:#165DFF; color:white;}
        .btn-selesai {background:#28a745; color:white;}
        .info {font-size:13px; color:#666; margin-top:8px;}
        .kosong {text-align:center; color:#888; padding:30px;}
    </style>
</head>
<body>

<div class="header">
    <h1>⚙️ HALAMAN PENGELOLA</h1>
    <p>Pembagian Dana & Transfer</p>
</div>

<div class="kartu" style="background:#e7f3ff;">
    <h3>📊 Ringkasan Hari Ini</h3>
    <p>Total Dana Masuk ke Rekeningmu: Rp <span id="total-masuk">0</span></p>
    <p>Bagian Kamu (15%): Rp <span id="bagian-saya">0</span></p>
</div>

<h3 style="margin:15px 0 8px;">📋 Daftar Dana Harus Dibagikan</h3>
<div id="daftar-dana"></div>
<div id="kosong" class="kosong">Semua dana sudah dibagikan ✅</div>


<!-- KONEKSI FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// GANTI DENGAN DATA FIREBASE KAMU
const firebaseConfig = {
  apiKey: "AIzaSyA9lMH2uHFtuNsLinSZN-r2xxxxxx",
  authDomain: "kkn-kuliner-khas-nusantara.firebaseapp.com",
  databaseURL: "https://kkn-kuliner-khas-nusantara-default-rtdb.firebaseio.com",
  projectId: "kkn-kuliner-khas-nusantara",
  storageBucket: "kkn-kuliner-khas-nusantara.appspot.com",
  messagingSenderId: "121728270775",
  appId: "1:121728270775:web:3a3f8b5ad73xxxxxx"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// DATA REKENING PIHAK LAIN (isi data asli nanti)
const rekening = {
    resto: {nama: "Warung Kuliner Nusantara", bank: "BCA", no: "1234567890"},
    driver: {nama: "Driver Utama", bank: "Mandiri", no: "0987654321"}
};


db.ref("PesananMasuk").on("value", snap => {
    const daftar = document.getElementById("daftar-dana");
    const kosong = document.getElementById("kosong");
    daftar.innerHTML = "";
    let totalMasuk = 0;
    let totalSaya = 0;

    if(!snap.exists()) { kosong.style.display="block"; return; }
    kosong.style.display="none";

    snap.forEach(dt => {
        const psn = dt.val();
        if(psn.status !== "Pesanan Selesai" || psn.sudahDibagikan) return;

        totalMasuk += psn.total_bayar;
        totalSaya += psn.bagian_pemilik || 0;

        daftar.innerHTML += `
        <div class="kartu belum">
            <h4>${psn.menu} | ${psn.waktu}</h4>
            <div class="baris"><span>Total Bayar Masuk ke Kamu:</span><span>Rp ${psn.total_bayar?.toLocaleString('id-ID')}</span></div>
            <hr style="margin:6px 0;">

            <div class="baris"><strong>Bagian Resto (60%):</strong></div>
            <div class="info">${rekening.resto.nama} | ${rekening.resto.bank} | ${rekening.resto.no}</div>
            <div style="display:flex; align-items:center; gap:8px; margin:4px 0;">
                <span>Rp ${psn.bagian_resto?.toLocaleString('id-ID')}</span>
                <button class="btn btn-salin" onclick="salin('${psn.bagian_resto}')">📋 Salin Jumlah</button>
            </div>

            <div class="baris mt-2"><strong>Bagian Driver (25%):</strong></div>
            <div class="info">${rekening.driver.nama} | ${rekening.driver.bank} | ${rekening.driver.no}</div>
            <div style="display:flex; align-items:center; gap:8px; margin:4px 0;">
                <span>Rp ${psn.bagian_driver?.toLocaleString('id-ID')}</span>
                <button class="btn btn-salin" onclick="salin('${psn.bagian_driver}')">📋 Salin Jumlah</button>
            </div>

            <button class="btn btn-selesai mt-2" onclick="tandaiSudah('${dt.key}')">✅ Tandai Sudah Ditransfer</button>
        </div>`;
    });

    document.getElementById('total-masuk').textContent = totalMasuk.toLocaleString('id-ID');
    document.getElementById('bagian-saya').textContent = totalSaya.toLocaleString('id-ID');
});


// FUNGSI SALIN ANGKA OTOMATIS
function salin(angka) {
    navigator.clipboard.writeText(angka);
    alert("✅ Jumlah uang sudah disalin!\nTinggal tempel di aplikasi bank: " + angka);
}

// TANDAI SUDAH DIBAGIKAN
function tandaiSudah(id) {
    if(confirm("Yakin sudah transfer ke Resto & Driver?")) {
        db.ref("PesananMasuk/"+id).update({sudahDibagikan: true});
        alert("✅ Tersimpan! Dana sudah dibagikan");
    }
}
</script>
</body>
</html>
