<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKN - Aplikasi Driver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f0f4f8;
            padding: 15px;
        }
        .header {
            background: #165DFF;
            color: white;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .pesanan-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #ffc107;
        }
        .status-menunggu {border-left-color: #ffc107;}
        .status-diantar {border-left-color: #165DFF;}
        .status-selesai {border-left-color: #28a745;}

        .label {font-size: 13px; color: #666; margin-top: 10px;}
        .nilai {font-size: 17px; font-weight: bold; color: #222;}
        .menu {color: #dc3545; font-size: 16px; margin: 8px 0;}

        .tombol-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-terima {background: #28a745; color: white;}
        .btn-selesai {background: #198754; color: white;}
        .btn-hubungi {background: #0d6efd; color: white;}
        .btn-batal {background: #dc3545; color: white;}

        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 999;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        .popup-tombol {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
        }
        .kosong {
            text-align: center;
            color: #666;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🏍️ KKN DRIVER</h1>
    <p>Daftar Pesanan Masuk</p>
</div>

<div id="daftar-pesanan"></div>
<div id="pesan-kosong" class="kosong"></div>

<!-- POPUP KONFIRMASI -->
<div class="overlay" id="layar-gelap"></div>
<div class="popup" id="popup-konfirmasi">
    <h3 id="judul-popup"></h3>
    <p id="isi-popup" style="margin:15px 0;"></p>
    <div class="popup-tombol">
        <button onclick="tutupPopup()" style="background:#ccc;">BELUM</button>
        <button id="tombol-ya" style="background:#dc3545; color:white;">Konfirmasi</button>
    </div>
</div>


<!-- KONEKSI FIREBASE SAMA DENGAN PELANGGAN -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// GANTI DENGAN DATA FIREBASE KAMU SAMA PERSIS SEPERTI DI INDEX.HTML
const firebaseConfig = {
  apiKey: "AIzaSyA9lMH2uHFtuNsLinSZN-r2xxxxxx",
  authDomain: "kkn-kuliner-khas-nusantara.firebaseapp.com",
  databaseURL: "https://kkn-kuliner-khas-nusantara-default-rtdb.firebaseio.com",
  projectId: "kkn-kuliner-khas-nusantara",
  storageBucket: "kkn-kuliner-khas-nusantara.appspot.com",
  messagingSenderId: "121728270775",
  appId: "1:121728270775:web:3a3f8b5ad73xxxxxx",
  measurementId: "G-S55TPHXFZ0"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
let pesananDipilih = null;


// BACA DATA PESANAN SECARA LANGSUNG (REAL-TIME)
database.ref("PesananMasuk").on("value", (snapshot) => {
    const daftar = document.getElementById("daftar-pesanan");
    const kosong = document.getElementById("pesan-kosong");
    daftar.innerHTML = "";

    if (!snapshot.exists()) {
        kosong.innerHTML = "📭 Belum ada pesanan baru";
        return;
    }
    kosong.innerHTML = "";

    snapshot.forEach((data) => {
        const id = data.key;
        const isi = data.val();

        let kelasStatus = "pesanan-card ";
        if (isi.status.includes("Menunggu")) kelasStatus += "status-menunggu";
        else if (isi.status.includes("Diantar")) kelasStatus += "status-diantar";
        else kelasStatus += "status-selesai";

        let tombolAksi = "";
        if (isi.status == "Menunggu Driver") {
            tombolAksi = `<button class="btn-terima" onclick="terimaPesanan('${id}')">✅ Terima Pesanan</button>`;
        } else if (isi.status == "Sedang Diantar") {
            tombolAksi = `
                <button class="btn-hubungi" onclick="hubungiPemesan('${isi.no_hp}')">📞 Hubungi</button>
                <button class="btn-selesai" onclick="tanyaSelesai('${id}')">✅ Selesai</button>
            `;
        } else {
            tombolAksi = `<p style="color:green; text-align:center;">✅ Pesanan Sudah Selesai</p>`;
        }

        daftar.innerHTML += `
        <div class="${kelasStatus}">
            <div class="label">MENU DIPILIH</div>
            <div class="menu">${isi.menu}</div>

            <div class="label">NAMA PEMESAN</div>
            <div class="nilai">${isi.nama_pemesan}</div>

            <div class="label">ALAMAT PENGIRIMAN</div>
            <div class="nilai">${isi.alamat}</div>

            <div class="label">CATATAN</div>
            <div class="nilai">${isi.catatan}</div>

            <div class="label">STATUS</div>
            <div class="nilai" style="color:#dc3545;">${isi.status}</div>

            <div class="tombol-group">${tombolAksi}</div>
        </div>
        `;
    });
});


// FUNGSI TERIMA PESANAN
function terimaPesanan(id) {
    database.ref("PesananMasuk/"+id).update({
        status: "Sedang Diantar"
    }).then(() => {
        alert("✅ Pesanan diterima! Silakan antar ke alamat tujuan");
    });
}

// FUNGSI TANYA KONFIRMASI SELESAI
function tanyaSelesai(id) {
    pesananDipilih = id;
    document.getElementById("judul-popup").textContent = "Konfirmasi Pengiriman";
    document.getElementById("isi-popup").textContent = "Apakah makanan sudah sampai & pembayaran sudah diterima?";
    document.getElementById("tombol-ya").textContent = "Selesai";
    document.getElementById("tombol-ya").onclick = selesaikanPesanan;
    document.getElementById("layar-gelap").style.display = "block";
    document.getElementById("popup-konfirmasi").style.display = "block";
}

// FUNGSI SELESAIKAN PESANAN
function selesaikanPesanan() {
    database.ref("PesananMasuk/"+pesananDipilih).update({
        status: "Pesanan Selesai"
    }).then(() => {
        tutupPopup();
        alert("✅ Terima kasih! Pesanan selesai dengan baik");
    });
}

// FUNGSI HUBUNGI PEMESAN
function hubungiPemesan(nomor) {
    window.location.href = "tel:" + nomor;
}

// TUTUP POPUP
function tutupPopup() {
    document.getElementById("layar-gelap").style.display = "none";
    document.getElementById("popup-konfirmasi").style.display = "none";
}
</script>

</body>
</html>
