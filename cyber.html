<style>#sistemPengamanan {display: none !important; visibility: hidden !important; position: absolute !important; top: -9999px !important; left: -9999px !important; width: 1px !important; height: 1px !important; overflow: hidden !important;}</style>
<div id="sistemPengamanan">
<section class="bg-white bayangan-lembut rounded-xl p-6 mb-10">
    <h2 class="text-xl font-bold mb-4">🛡️ Sistem Pengamanan & Notifikasi Ancaman</h2>
    <div class="bg-sukses/10 p-4 rounded-lg mb-4">
        <p class="font-bold text-sukses">✅ Status: SISTEM PENGAWASAN AKTIF</p>
        <p class="text-sm mt-1">Notifikasi serangan akan dikirim ke:</p>
        <p class="text-sm font-mono mt-1">📱 WA: +62 882-0078-69413 | 📧 Email: fadliifansyah120205@gmail.com</p>
    </div>
</section>
</div>

<script>
// ==================================================
// 🔒 KONFIGURASI RAHASIA KHUSUS PEMILIK SAJA
// ==================================================
const KONFIG_KEAMANAN = {
    nomorWA: '62882007869413',
    emailTujuan: 'fadliifansyah120205@gmail.com',
    batasLoginGagal: 5,
    batasPermintaanBerlebih: 100,
    aktifkanLog: true
};

// ==================================================
// 🚨 SISTEM PENDETEKSI SERANGAN - TIDAK TERLIHAT PENGGUNA
// ==================================================
const SistemKeamanan = {
    logAktivitas: [],
    hitunganLoginGagal: 0,
    daftarAksesMencurigakan: [],
    polaSerangan: [
        /(\b(SELECT|INSERT|UPDATE|DELETE|DROP|UNION|ALTER)\b)/i,
        /(<script|javascript:|alert\(|onload=)/i,
        /(\.\.\/|\/etc\/passwd|boot\.ini)/i,
        /(\b(OR|AND)\s+\d+\s*=\s*\d+)/i,
        /(eval\(|base64_decode|exec\()/i
    ],

    catatAktivitas(jenis, pesan, ipPengguna = '127.0.0.1') {
        const dataLog = {
            waktu: new Date().toLocaleString('id-ID'),
            jenis, pesan, ipPengguna, agenPengguna: navigator.userAgent
        };
        this.logAktivitas.push(dataLog);
        if(KONFIG_KEAMANAN.aktifkanLog) console.log('🔒 LOG KEAMANAN:', dataLog);
        return dataLog;
    },

    cekSerangan(konten) {
        if(!konten || typeof konten !== 'string') return {aman: true};
        for(let i = 0; i < this.polaSerangan.length; i++) {
            if(this.polaSerangan[i].test(konten)) {
                return {
                    aman: false,
                    jenisSerangan: ['SQL Injection', 'Suntik Kode/XSS', 'Akses File Ilegal', 'Akal Logika', 'Eksekusi Kode'][i],
                    pesan: `Terdeteksi percobaan serangan: ${['SQL Injection', 'Suntik Kode/XSS', 'Akses File Ilegal', 'Akal Logika', 'Eksekusi Kode'][i]}`
                };
            }
        }
        return {aman: true};
    },

    catatLoginGagal(ip = '127.0.0.1') {
        this.hitunganLoginGagal++;
        const log = this.catatAktivitas('PERINGATAN', `Percobaan login GAGAL (ke-${this.hitunganLoginGagal})`, ip);
        
        if(this.hitunganLoginGagal >= KONFIG_KEAMANAN.batasLoginGagal) {
            this.kirimNotifikasi({
                tingkat: '🔴 BAHAYA',
                judul: 'PERINGATAN SERANGAN: Percobaan Masuk Paksa!',
                isi: `Terjadi ${this.hitunganLoginGagal}x percobaan login gagal berturut-turut!\nIP: ${ip}\nWaktu: ${log.waktu}\nSistem: Aplikasi S-Nusantara`
            });
        }
    },

    kirimNotifikasi(dataAncaman) {
        const pesanWA = `🔴 *PERINGATAN KEAMANAN S-NUSANTARA* 🔴
━━━━━━━━━━━━━━━━━━
*TINGKAT:* ${dataAncaman.tingkat}
*JUDUL:* ${dataAncaman.judul}
*WAKTU:* ${new Date().toLocaleString('id-ID')}
━━━━━━━━━━━━━━━━━━
${dataAncaman.isi}
━━━━━━━━━━━━━━━━━━
Segera cek sistem!`;

        // Kirim ke WA kamu
        const linkWA = `https://wa.me/${KONFIG_KEAMANAN.nomorWA}?text=${encodeURIComponent(pesanWA)}`;
        window.open(linkWA, '_blank');
        console.log('📲 Notifikasi WA terkirim ke nomor pemilik');

        // Kirim ke email kamu
        const linkEmail = `mailto:${KONFIG_KEAMANAN.emailTujuan}?subject=${encodeURIComponent(`PERINGATAN: ${dataAncaman.judul}`)}&body=${encodeURIComponent(pesanWA)}`;
        window.location.href = linkEmail;
        console.log('📧 Notifikasi Email terkirim ke:', KONFIG_KEAMANAN.emailTujuan);

        this.daftarAksesMencurigakan.push(dataAncaman);
    },

    periksaInput(dataMasukan, ipPengguna = '127.0.0.1') {
        const hasil = this.cekSerangan(dataMasukan);
        if(!hasil.aman) {
            this.catatAktivitas('SERANGAN', hasil.pesan, ipPengguna);
            this.kirimNotifikasi({
                tingkat: '🔴 BAHAYA',
                judul: `TERDETEKSI SERANGAN: ${hasil.jenisSerangan}`,
                isi: `Jenis Serangan: ${hasil.jenisSerangan}\nKonten: ${dataMasukan.substring(0,100)}\nIP: ${ipPengguna}\nWaktu: ${new Date().toLocaleString('id-ID')}`
            });
            return false;
        }
        return true;
    }
};
</script>
